<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume Polish - ATS Optimization Tool</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 1.1em;
    }

    .upload-area {
      border: 3px dashed #667eea;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      margin: 30px 0;
      cursor: pointer;
      transition: all 0.3s;
    }

    .upload-area:hover {
      border-color: #764ba2;
      background: #f8f9ff;
    }

    .upload-area.dragover {
      background: #f0f3ff;
      border-color: #764ba2;
    }

    input[type="file"] {
      display: none;
    }

    .btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 15px 40px;
      font-size: 1.1em;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s;
      font-weight: 600;
      margin-right: 10px;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-mock {
      background: linear-gradient(135deg, #999 0%, #777 100%);
    }

    .result {
      margin-top: 30px;
      padding: 30px;
      background: #f8f9ff;
      border-radius: 12px;
      border-left: 4px solid #667eea;
      line-height: 1.8;
    }

    .result h3 {
      color: #667eea;
      margin: 20px 0 10px 0;
      font-size: 1.3em;
    }

    .result strong {
      color: #333;
      font-weight: 600;
    }

    .result p {
      margin: 15px 0;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #667eea;
      font-size: 1.2em;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .error {
      background: #fee;
      border-left-color: #e33;
      color: #c00;
    }

    .filename {
      color: #667eea;
      font-weight: 600;
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Resume Polish</h1>
    <p class="subtitle">Get your resume ATS-ready in seconds</p>

    <div class="upload-area" id="uploadArea">
      <p style="font-size: 1.2em; margin-bottom: 10px;">📄 Drop your resume here</p>
      <p style="color: #999;">or click to browse</p>
      <p style="color: #999; font-size: 0.9em; margin-top: 10px;">Supports .txt files</p>
      <input type="file" id="fileInput" accept=".txt">
    </div>

    <div id="filename" class="filename" style="display: none;"></div>

    <div style="margin: 20px 0;">
      <button class="btn" id="analyzeBtn" style="display: none;">Analyze Resume</button>
      <button class="btn btn-mock" id="mockBtn">View Sample Result (No API Call)</button>
    </div>

    <div id="loading" class="loading" style="display: none;">
      <div class="spinner"></div>
      <p>Analyzing your resume with AI...</p>
    </div>

    <div id="result" class="result" style="display: none;"></div>
  </div>

  <script>
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const mockBtn = document.getElementById('mockBtn');
    const loading = document.getElementById('loading');
    const result = document.getElementById('result');
    const filenameDiv = document.getElementById('filename');

    let selectedFile = null;

    // Sample mock data for testing design without API calls
    const mockAnalysis = `**ATS Compatibility Score: 72/100**

**Explanation:** The resume has good keyword usage and clear structure, but lacks proper section headers, has inconsistent date formatting, and could benefit from more quantified achievements. The content is relevant but needs better optimization for ATS parsing.

## Top 3-5 Critical Issues for ATS Rejection

1. **Missing core section headers**: No "SKILLS" header - just "TECHNICAL SKILLS" which some ATS may not recognize
2. **Inconsistent date formatting**: Mix of "2021 - Present" vs "2018 - 2019" creates parsing confusion
3. **Weak quantification**: Limited metrics and numbers that ATS algorithms prioritize for ranking
4. **Generic job titles**: "IT Support Specialist" is too broad and doesn't contain key MDM/endpoint management terms
5. **Missing industry keywords**: Lacks terms like "endpoint security," "device compliance," "enterprise mobility"

## 5-7 Specific Improvement Suggestions

1. **Add standard "SKILLS" section** with comma-separated keywords: "Mobile Device Management (MDM), Jamf Pro, Microsoft Intune, Workspace ONE, Endpoint Security, Device Compliance"

2. **Standardize all dates** to "MM/YYYY - MM/YYYY" format (e.g., "01/2021 - Present")

3. **Add 2-3 more quantified achievements** per role:
   - "Achieved 99.5% device compliance rate across enterprise environment"
   - "Reduced security incidents by 40% through automated compliance monitoring"

4. **Include location format consistently**: Use full format for all jobs ("San Francisco, CA" vs just "Remote")

5. **Add "CORE COMPETENCIES" section** with: Enterprise Mobility Management, Zero Trust Security, Automated Deployment, Device Lifecycle Management, IT Service Management

## LinkedIn Headline Options

1. Senior Client Platform Engineer | MDM Specialist (Jamf, Intune, Workspace ONE) | Enterprise Mobility Expert
2. IT Infrastructure Pro | 5+ Years Managing Apple/Microsoft Endpoints | Jamf Certified
3. Client Platform Engineer | Automating Device Management at Scale | MDM • Scripting • Security
4. Enterprise Device Management Specialist | Jamf Pro • Workspace ONE • Intune | 1200+ Endpoints
5. Apple Enterprise Expert | Jamf & MDM Solutions | Reducing IT Friction Through Automation

## Missing Keywords to Add

- Endpoint security, device compliance, enterprise mobility
- Zero-touch deployment, DEP (Device Enrollment Program), ABM (Apple Business Manager)  
- Conditional access, mobile threat defense
- BYOD (Bring Your Own Device), corporate-owned devices
- Patch management, software distribution
- Identity and access management (IAM)`;

    // Function to format the analysis
    function formatAnalysis(text) {
      const formatted = text
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/##\s*(.+)/g, '<h3>$1</h3>')
        .replace(/(\d+\.)\s*\*\*(.+?)\*\*/g, '$1 <strong>$2</strong>')
        .replace(/\n\n/g, '</p><p>')
        .replace(/\n/g, '<br>');
      
      return '<p>' + formatted + '</p>';
    }

    // Mock button - shows sample result without API call
    mockBtn.addEventListener('click', () => {
      loading.style.display = 'none';
      result.style.display = 'block';
      result.className = 'result';
      result.innerHTML = formatAnalysis(mockAnalysis);
    });

    // Click to upload
    uploadArea.addEventListener('click', () => fileInput.click());

    // File selected
    fileInput.addEventListener('change', (e) => {
      selectedFile = e.target.files[0];
      if (selectedFile) {
        filenameDiv.textContent = `Selected: ${selectedFile.name}`;
        filenameDiv.style.display = 'block';
        analyzeBtn.style.display = 'inline-block';
      }
    });

    // Drag and drop
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      selectedFile = e.dataTransfer.files[0];
      if (selectedFile) {
        filenameDiv.textContent = `Selected: ${selectedFile.name}`;
        filenameDiv.style.display = 'block';
        analyzeBtn.style.display = 'inline-block';
      }
    });

    // Analyze button - actual API call
    analyzeBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      loading.style.display = 'block';
      result.style.display = 'none';
      analyzeBtn.disabled = true;

      const formData = new FormData();
      formData.append('resume', selectedFile);

      try {
        const response = await fetch('http://localhost:3000/api/analyze', {
          method: 'POST',
          body: formData
        });

        const data = await response.json();

        loading.style.display = 'none';
        result.style.display = 'block';

        if (data.success) {
          result.className = 'result';
          result.innerHTML = formatAnalysis(data.analysis);
        } else {
          result.className = 'result error';
          result.textContent = `Error: ${data.error}`;
        }
      } catch (error) {
        loading.style.display = 'none';
        result.style.display = 'block';
        result.className = 'result error';
        result.textContent = `Error: ${error.message}`;
      } finally {
        analyzeBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
