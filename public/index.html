<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume Polish - ATS Optimization Tool</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 1.1em;
    }

    .upload-area {
      border: 3px dashed #667eea;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      margin: 30px 0;
      cursor: pointer;
      transition: all 0.3s;
    }

    .upload-area:hover {
      border-color: #764ba2;
      background: #f8f9ff;
    }

    .upload-area.dragover {
      background: #f0f3ff;
      border-color: #764ba2;
    }

    input[type="file"] {
      display: none;
    }

    .btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 15px 40px;
      font-size: 1.1em;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s;
      font-weight: 600;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .result {
      margin-top: 30px;
      padding: 30px;
      background: #f8f9ff;
      border-radius: 12px;
      border-left: 4px solid #667eea;
      white-space: pre-wrap;
      line-height: 1.8;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #667eea;
      font-size: 1.2em;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .error {
      background: #fee;
      border-left-color: #e33;
      color: #c00;
    }

    .filename {
      color: #667eea;
      font-weight: 600;
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Resume Polish</h1>
    <p class="subtitle">Get your resume ATS-ready in seconds</p>

    <div class="upload-area" id="uploadArea">
      <p style="font-size: 1.2em; margin-bottom: 10px;">📄 Drop your resume here</p>
      <p style="color: #999;">or click to browse</p>
      <p style="color: #999; font-size: 0.9em; margin-top: 10px;">Supports .txt files</p>
      <input type="file" id="fileInput" accept=".txt">
    </div>

    <div id="filename" class="filename" style="display: none;"></div>

    <button class="btn" id="analyzeBtn" style="display: none;">Analyze Resume</button>

    <div id="loading" class="loading" style="display: none;">
      <div class="spinner"></div>
      <p>Analyzing your resume with AI...</p>
    </div>

    <div id="result" class="result" style="display: none;"></div>
  </div>

  <script>
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const loading = document.getElementById('loading');
    const result = document.getElementById('result');
    const filenameDiv = document.getElementById('filename');

    let selectedFile = null;

    // Click to upload
    uploadArea.addEventListener('click', () => fileInput.click());

    // File selected
    fileInput.addEventListener('change', (e) => {
      selectedFile = e.target.files[0];
      if (selectedFile) {
        filenameDiv.textContent = `Selected: ${selectedFile.name}`;
        filenameDiv.style.display = 'block';
        analyzeBtn.style.display = 'block';
      }
    });

    // Drag and drop
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      selectedFile = e.dataTransfer.files[0];
      if (selectedFile) {
        filenameDiv.textContent = `Selected: ${selectedFile.name}`;
        filenameDiv.style.display = 'block';
        analyzeBtn.style.display = 'block';
      }
    });

    // Analyze button
    analyzeBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      // Show loading
      loading.style.display = 'block';
      result.style.display = 'none';
      analyzeBtn.disabled = true;

      // Create form data
      const formData = new FormData();
      formData.append('resume', selectedFile);

      try {
        const response = await fetch('http://localhost:3000/api/analyze', {
          method: 'POST',
          body: formData
        });

        const data = await response.json();

        loading.style.display = 'none';
        result.style.display = 'block';

        if (data.success) {
          result.className = 'result';
          result.textContent = data.analysis;
        } else {
          result.className = 'result error';
          result.textContent = `Error: ${data.error}`;
        }
      } catch (error) {
        loading.style.display = 'none';
        result.style.display = 'block';
        result.className = 'result error';
        result.textContent = `Error: ${error.message}`;
      } finally {
        analyzeBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
